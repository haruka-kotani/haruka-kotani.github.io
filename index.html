<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 60px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }

    h1 {
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 1px;
    }

    nav a {
      margin-left: 24px;
      text-decoration: none;
      color: #111;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .item {
      position: relative;
      overflow: hidden;
    }

    .item img {
      width: 100%;
      display: block;
      transition: 0.4s;
    }

    .item:hover img {
      opacity: 0.85;
      transform: scale(1.03);
    }

    .title {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: 0.3s;
    }

    .item:hover .title {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>YOUR NAME</h1>
    <nav>
      <a href="#">WORK</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </nav>
  </header>

  <section class="grid">

    <a class="item" href="#">
      <img src="images/img1.jpg" alt="">
      <div class="title">Project 1</div>
    </a>

    <a class="item" href="#">
      <img src="images/img2.jpg" alt="">
      <div class="title">Project 2</div>
    </a>

    <a class="item" href="#">
      <img src="images/img3.jpg" alt="">
      <div class="title">Project 3</div>
    </a>

    <a class="item" href="#">
      <img src="images/img4.jpg" alt="">
      <div class="title">Project 4</div>
    </a>

    <a class="item" href="#">
      <img src="images/img5.jpg" alt="">
      <div class="title">Project 5</div>
    </a>

    <a class="item" href="#">
      <img src="images/img6.jpg" alt="">
      <div class="title">Project 6</div>
    </a>

  </section>

</body>
</html>
